name: PR Preview

# Builds each pull request and publishes it to GitHub Pages under
# https://docs.civic.com/pr-preview/pr-<N>/ for a shareable, hosted preview.
# rossjrw/pr-preview-action deploys to the `pr-preview/` umbrella on the
# gh-pages branch, comments the URL on the PR, and removes the preview when the
# PR is closed. The build also serves as build CI (it exercises the build-time
# fetch of bryn.civic.com before merge).

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - if: github.event.action != 'closed'
        run: pnpm install --frozen-lockfile
      - if: github.event.action != 'closed'
        run: pnpm build
        env:
          PREVIEW_BASE_URL: /pr-preview/pr-${{ github.event.number }}/
      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./build
          umbrella-dir: pr-preview
          pages-base-url: docs.civic.com
