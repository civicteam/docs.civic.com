# Lychee configuration file
# https://github.com/lycheeverse/lychee#configuration-file

# Base URL for resolving relative links
# Set via command line for different environments
# base = "https://docs.civic.com"

# Maximum number of concurrent network requests
max_concurrency = 10

# User agent string - browser-like to avoid bot detection
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

# Accept these status codes
# 202 added for postmark signup/credential URLs that return 202 Accepted
# 403 added for npmjs.com which returns this for bot detection
accept = [200, 202, 204, 206, 301, 302, 307, 308, 403, 429]

# Exclude these patterns
exclude = [
  # Self — every Docusaurus page emits absolute canonical/og:url tags pointing
  # at docs.civic.com, which lychee otherwise network-fetches once per page.
  # Internal link validity is already covered by --root-dir against build/, and
  # site uptime is covered by the deploy workflow; checking ourselves over HTTP
  # only adds 5xx flakiness.
  '^https?://docs\.civic\.com',

  # Localhost
  '^https?://localhost',
  '^https?://127\.0\.0\.1',

  # GitHub line numbers
  'github\.com.*#L[0-9]+',

  # Social media (often rate-limited or block bots)
  '^https?://(www\.)?(twitter|x|linkedin|facebook|instagram)\.com',

  # AI services that block bots
  '^https?://(www\.)?claude\.ai',
  '^https?://(www\.)?notion\.so',
  '^https?://(www\.)?chat\.mistral\.ai',

  # Mintlify dashboard (returns intermittent 500 errors)
  '^https?://dashboard\.mintlify\.com',

  # Civic Auth dashboard (returns 500 to bot requests)
  '^https?://auth\.civic\.com',

  # Contact addresses
  '^mailto:',
  '^tel:',

  # civic.com fragments (client-side rendered, not detectable by lychee)
  '^https?://(www\.)?civic\.com/#',

  # Application protocol links
  '^cursor://',
  '^vscode:',

  # npm packages (often rate-limited in CI)
  '^https?://www\.npmjs\.com/package/',

  # caniuse.com (frequently times out in CI)
  '^https?://caniuse\.com',
]

# Exclude all private IPs
exclude_all_private = true

# Exclude loopback IPs
exclude_loopback = true

# Maximum number of retries
max_retries = 3

# Timeout for network requests (in seconds)
timeout = 30

# Check external links
skip_missing = false

# Method to use for requests
method = "get"

# Follow redirects
max_redirects = 10

# Cache results for 1 day
cache = true

# Include fragment checking (anchors)
include_fragments = true

# Fallback extensions for checking files without extensions.
# Lychee runs against the built site (see .github/workflows/link-check-*.yml),
# so Docusaurus-emitted `<slug>.html` files are the resolution target.
fallback_extensions = ["html", "htm"]
